<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Gerardo (Benji) Colegio — Software Developer. Portfolio, projects, and a playground of GSAP animations."
    />
    <meta name="theme-color" content="#0d1117" />

    <!-- Open Graph -->
    <meta property="og:title" content="Gerardo Colegio — Software Developer" />
    <meta
      property="og:description"
      content="A developer portfolio built with React + GSAP. Projects, animations, and photography."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gerardocolegio.dev/" />
    <meta property="og:image" content="/projects/Chroma-Lair.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>Gerardo Colegio — Software Developer</title>
  </head>
  <body>
    <div id="root">
      <!-- Fallback shown until React mounts (replaced instantly when the built
           bundle loads). If the deploy ever serves raw source, this keeps the
           screen branded instead of blank-white. -->
      <div
        id="boot-fallback"
        style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#0d1117;color:#c9d1d9;font-family:ui-sans-serif,system-ui,sans-serif;text-align:center;padding:24px"
      >
        <div style="font-family:ui-monospace,monospace;font-size:13px;letter-spacing:0.3em;text-transform:uppercase;color:#2ee6d6">
          Gerardo Colegio
        </div>
        <div style="width:140px;height:2px;background:#232b36;overflow:hidden;border-radius:99px">
          <div style="width:40%;height:100%;background:#2ee6d6;animation:boot 1s ease-in-out infinite"></div>
        </div>
        <div style="color:#7d8694;font-size:13px">Loading…</div>
      </div>
      <style>
        @keyframes boot { 0%{transform:translateX(-120%)} 100%{transform:translateX(360%)} }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
